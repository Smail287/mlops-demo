name: Update README

on:
  push:
    branches: ["main"]

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate README
        run: |
          echo "# MLOps Demo" > README.md
          echo "" >> README.md
          echo "## Dernier commit" >> README.md
          git log -1 --pretty=format:"* %h - %s (%an, %ad)" >> README.md
          echo "" >> README.md
          echo "## Statut pipeline" >> README.md
          echo "![Pipeline](https://github.com/${{ github.repository }}/actions/workflows/mlops.yml/badge.svg)" >> README.md
          echo "" >> README.md
          echo "## Dépendances" >> README.md
          cat requirements.txt >> README.md

      - name: Commit README
        run: |
          git config --local user.email "n@gactioithub.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "Update README via GitHub Action" || echo "No changes to commit"
          git push